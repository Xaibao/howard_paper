<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HLS Test</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body style="background:#000;display:flex;flex-direction:column;align-items:center;padding:20px">
<h2 style="color:#fff;font-family:monospace">HLS Stream Test</h2>
<video id="v" controls autoplay muted playsinline
  style="width:800px;max-width:100%;background:#111"></video>
<div id="log" style="color:#0f0;font-family:monospace;font-size:13px;margin-top:16px;white-space:pre"></div>
<script>
const url = 'http://100.108.78.9:18000/live/stream/index.m3u8';
const video = document.getElementById('v');
const log = document.getElementById('log');
function L(msg){ log.textContent += msg + '\n'; }

L('HLS.isSupported: ' + Hls.isSupported());
if (Hls.isSupported()) {
  const hls = new Hls({ lowLatencyMode: true, liveSyncDurationCount: 2, maxBufferLength: 3 });
  hls.loadSource(url);
  hls.attachMedia(video);
  hls.on(Hls.Events.MANIFEST_PARSED, () => { L('✓ MANIFEST_PARSED'); video.play(); });
  hls.on(Hls.Events.FRAG_LOADED, (e, d) => { L('✓ frag loaded: ' + d.frag.sn); });
  hls.on(Hls.Events.ERROR, (e, d) => { L('✗ ERROR: ' + d.type + ' / ' + d.details + ' fatal=' + d.fatal); });
} else {
  L('hls.js not supported, trying native');
  video.src = url;
  video.play();
}
</script>
</body>
</html>
